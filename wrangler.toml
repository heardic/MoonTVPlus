name = "moontv-plus"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next/assets"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "moontvplus"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
NODE_ENV = "production"
BUILD_TARGET = "cloudflare"
